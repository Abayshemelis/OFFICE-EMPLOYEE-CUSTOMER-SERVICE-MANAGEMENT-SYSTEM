<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OECSMS - Reset Password</title>
    <link rel="stylesheet" href="shared/style.css">
    <style>
        .reset-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }
        .reset-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            text-align: center;
        }
        .logo-section {
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--primary-color);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: white;
            box-shadow: 0 0 20px var(--primary-glow);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="reset-wrapper">
        <div class="glass-panel reset-card" id="form-panel">
            <div class="logo-section">
                <div class="logo-icon">R</div>
                <h2>Reset Password</h2>
                <p>Please enter your new password below.</p>
            </div>
            <form id="reset-form">
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" for="password">New Password</label>
                    <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
                </div>
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input class="form-input" type="password" id="confirm-password" placeholder="Verify new password" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Update Password</button>
            </form>
            <div id="success-view" style="display: none;">
                <div style="font-size: 48px; color: var(--success-color); margin-bottom: 20px;">✓</div>
                <h3>Password Updated!</h3>
                <p style="margin-bottom: 30px;">Your password has been successfully reset. You can now login using your new credentials.</p>
                <button onclick="window.location.href='index.html'" class="btn btn-primary" style="width: 100%;">Go to Login</button>
            </div>
        </div>
    </div>

    <script src="shared/api.js"></script>
    <script src="shared/utils.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            Utils.toast('No reset token found in the URL.', 'Error', 'danger');
            document.getElementById('reset-form').style.display = 'none';
            document.querySelector('#form-panel p').innerText = 'Invalid link. Missing token.';
            document.querySelector('#form-panel p').style.color = 'var(--danger-color)';
        }

        document.getElementById('reset-form').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                Utils.toast('Passwords do not match.', 'Validation Error', 'danger');
                return;
            }

            const res = await API.resetPassword(token, password);
            if (res.success) {
                Utils.toast('Your password has been updated.', 'Success', 'success');
                document.getElementById('reset-form').style.display = 'none';
                document.querySelector('#form-panel p').style.display = 'none';
                document.getElementById('success-view').style.display = 'block';
            } else {
                Utils.toast(res.message || 'Failed to reset password.', 'Error', 'danger');
            }
        };
    </script>
</body>
</html>
